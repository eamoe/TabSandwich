<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tab Sandwich</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="hero">
    <div class="hero-top">
      <div class="mark" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <rect x="3" y="5" width="18" height="4" rx="2"/>
          <rect x="3" y="11" width="18" height="4" rx="2"/>
          <rect x="3" y="17" width="18" height="4" rx="2"/>
        </svg>
      </div>
      <div class="hero-heading">
        <h1 class="brand-name">Tab Sandwich</h1>
        <p class="tagline">Your tabs, tidy and saved</p>
      </div>
      <button type="button" id="gear-btn" class="gear-btn" aria-label="Open settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <div class="progress-bar" id="progress-bar" role="progressbar" aria-label="Storage used" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="stats-row">
      <span class="header-stats" id="header-stats">0 saved</span>
      <span class="storage-usage" id="storage-usage"></span>
    </div>

    <div class="action-row" id="action-row">
      <button type="button" id="save-btn" class="save-btn">Save This Tab</button>
    </div>
    <p id="save-status" class="save-status" role="status" aria-live="polite"></p>

    <details class="manual-entry" id="manual-entry">
      <summary>+ Add a link manually</summary>
      <form id="manual-entry-form" class="manual-entry-form">
        <label for="manual-url">URL</label>
        <input type="text" id="manual-url" name="url" placeholder="https://example.com" required>

        <label for="manual-title">Title (optional)</label>
        <input type="text" id="manual-title" name="title" placeholder="Title">

        <label for="manual-category">Category (optional)</label>
        <select id="manual-category" name="category">
          <option value="">Uncategorized</option>
        </select>

        <button type="submit" class="manual-entry-submit">Add link</button>
      </form>
    </details>
  </header>

  <nav class="pills-row" id="pills-container" aria-label="Filter saved tabs"></nav>

  <main id="main-view">
    <ul id="tab-list" class="tab-list" aria-label="Saved tabs"></ul>
  </main>

  <section id="settings-view" class="settings-view" hidden aria-label="Settings">
    <div class="settings-header">
      <button type="button" id="back-btn" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
    </div>

    <div class="settings-section">
      <div class="settings-row">
        <div>
          <label for="outdated-toggle" class="settings-label">Outdated tabs</label>
          <p class="settings-sublabel">Highlight tabs saved longer than the threshold below</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="outdated-toggle" class="visually-hidden">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="days-row">
        <label for="outdated-days">Mark as outdated after</label>
        <input type="number" id="outdated-days" min="1" max="365" value="7">
        <span>days</span>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-row">
        <span class="settings-label" id="shortcut-label">Keyboard shortcut</span>
        <div class="shortcut-controls">
          <span id="shortcut-display" class="shortcut-badge" aria-labelledby="shortcut-label"></span>
          <button type="button" id="shortcut-customize-btn" class="btn-accent">Customize</button>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <h2 class="settings-label">Categories</h2>
      <form id="add-category-form" class="add-category-form">
        <label for="new-category-input" class="visually-hidden">New category</label>
        <input type="text" id="new-category-input" placeholder="New category" maxlength="15">
        <button type="submit">Add</button>
      </form>
      <div id="new-category-counter" class="char-counter" aria-hidden="true">0/15</div>
      <ul id="category-list" class="category-list" aria-label="Configured categories"></ul>
    </div>
  </section>

  <script type="module" src="js/popup.js"></script>
</body>
</html>
