name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension
        run: |
          mkdir -p dist/tab-sandwich
          cp manifest.json dist/tab-sandwich/
          cp -r images dist/tab-sandwich/
          cp -r popup dist/tab-sandwich/
          cd dist/tab-sandwich
          zip -r "../tab-sandwich-${GITHUB_REF_NAME}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tab-sandwich-${{ github.ref_name }}.zip
